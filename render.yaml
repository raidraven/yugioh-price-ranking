# Render.com deployment YAML
services:
  - type: web
    name: yugioh-price-ranking
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn yugioh_price.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: yugioh_price.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: yugioh-price-ranking.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: yugioh-price-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: yugioh-price-db
    databaseName: yugioh_price
    user: yugioh_user
    plan: free
