<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 421 614">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#1a2540"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#e8c97a"/>
      <stop offset="100%" style="stop-color:#8a6a20"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Card body -->
  <rect width="421" height="614" rx="18" fill="url(#bg)"/>

  <!-- Outer border -->
  <rect x="4" y="4" width="413" height="606" rx="15" fill="none" stroke="url(#border)" stroke-width="3"/>

  <!-- Inner border -->
  <rect x="12" y="12" width="397" height="590" rx="11" fill="none" stroke="url(#border)" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Background glow center -->
  <ellipse cx="210" cy="307" rx="200" ry="200" fill="url(#glow)"/>

  <!-- Grid lines (card back hex pattern) -->
  <g opacity="0.08" stroke="#c9a84c" stroke-width="0.5">
    <!-- horizontal -->
    <line x1="20" y1="60" x2="401" y2="60"/>
    <line x1="20" y1="120" x2="401" y2="120"/>
    <line x1="20" y1="180" x2="401" y2="180"/>
    <line x1="20" y1="240" x2="401" y2="240"/>
    <line x1="20" y1="307" x2="401" y2="307"/>
    <line x1="20" y1="374" x2="401" y2="374"/>
    <line x1="20" y1="434" x2="401" y2="434"/>
    <line x1="20" y1="494" x2="401" y2="494"/>
    <line x1="20" y1="554" x2="401" y2="554"/>
    <!-- vertical -->
    <line x1="70" y1="20" x2="70" y2="594"/>
    <line x1="140" y1="20" x2="140" y2="594"/>
    <line x1="210" y1="20" x2="210" y2="594"/>
    <line x1="280" y1="20" x2="280" y2="594"/>
    <line x1="351" y1="20" x2="351" y2="594"/>
  </g>

  <!-- Central star / seal -->
  <g transform="translate(210,307)">
    <!-- Outer ring -->
    <circle r="110" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle r="90"  fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4"/>
    <!-- 6-pointed star -->
    <polygon points="0,-80 13.9,-24 72,-24 27.6,9.3 44.7,65.3 0,32 -44.7,65.3 -27.6,9.3 -72,-24 -13.9,-24"
             fill="none" stroke="#c9a84c" stroke-width="2" stroke-opacity="0.8"/>
    <!-- Inner circle -->
    <circle r="30" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Center dot -->
    <circle r="6" fill="#c9a84c" opacity="0.7"/>
    <!-- Eye of the dragon (simple) -->
    <ellipse rx="18" ry="9" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.6"/>
  </g>

  <!-- Corner decorations -->
  <g fill="#c9a84c" opacity="0.6" font-family="serif" font-size="24">
    <text x="22" y="48">✦</text>
    <text x="375" y="48">✦</text>
    <text x="22" y="596">✦</text>
    <text x="375" y="596">✦</text>
  </g>

  <!-- Top & bottom stripe -->
  <rect x="20" y="20" width="381" height="28" rx="6" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
  <rect x="20" y="566" width="381" height="28" rx="6" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
</svg>
